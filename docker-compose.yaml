services:
  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        pid=$$!
        until ollama list >/dev/null 2>&1; do sleep 2; done
        ollama pull "$${MODEL:-qwen2.5:1.5b}"
        wait $$pid
    environment:
      - MODEL=${MODEL:-qwen2.5:1.5b}
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  chatbot:
    build: ./src/app
    environment:
      - OPENAI_BASE_URL=http://ollama:11434/v1
      - OPENAI_API_KEY=ollama
      - MODEL=${MODEL:-qwen2.5:1.5b}
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - ollama

volumes:
  ollama:
