name        = "break-glass"
description = "Run an emergency, elevated-access remediation through a recorded runbook instead of ad-hoc console access."
readme      = "./runbooks/break-glass.md"

[labels]
team = "platform"
kind = "break-glass"

[[steps]]
name        = "emergency-remediation"
type        = "action"
action_name = "break_glass_remediation"

[[steps]]
name    = "verify"
type    = "action"
timeout = "5m"
command = 'curl --fail --show-error --silent --retry $MAX_RETRIES --retry-delay 15 https://{{ .nuon.inputs.inputs.sub_domain }}.{{ .nuon.install.sandbox.outputs.nuon_dns.public_domain.name }}/health'

[steps.env_vars]
MAX_RETRIES = "20"
