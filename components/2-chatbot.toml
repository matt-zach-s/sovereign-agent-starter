# helm
name           = "chatbot"
type           = "helm_chart"
chart_name     = "chatbot"
namespace      = "agent"
storage_driver = "configmap"
deploy_timeout = "20m"
dependencies   = ["ollama", "chatbot_image"]

[public_repo]
repo      = "matt-zach-s/sovereign-agent-starter"
directory = "src/charts/chatbot"
branch    = "main"

[[values_file]]
contents = "./values/chatbot.yaml"
