apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    app: chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      containers:
      - name: chatbot
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: Always
        env:
        - name: OPENAI_BASE_URL
          value: "{{ .Values.openaiBaseUrl }}"
        - name: OPENAI_API_KEY
          value: "ollama"
        - name: MODEL
          value: "{{ .Values.model }}"
        - name: PORT
          value: "{{ .Values.deployment.containerPort }}"
        ports:
        - containerPort: {{ .Values.deployment.containerPort }}
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # Gate readiness/liveness until the Python app has finished importing and
        # is serving /health — covers image pull + a slow cold start (~up to 150s)
        # without the liveness probe restarting a still-booting container.
        startupProbe:
          httpGet:
            path: /health
            port: {{ .Values.deployment.containerPort }}
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.deployment.containerPort }}
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.deployment.containerPort }}
          periodSeconds: 15
