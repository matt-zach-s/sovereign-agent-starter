apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    app: chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      containers:
      - name: chatbot
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        env:
        - name: OPENAI_BASE_URL
          value: "{{ .Values.openaiBaseUrl }}"
        - name: OPENAI_API_KEY
          value: "ollama"
        - name: MODEL
          value: "{{ .Values.model }}"
        - name: PORT
          value: "{{ .Values.deployment.containerPort }}"
        ports:
        - containerPort: {{ .Values.deployment.containerPort }}
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.deployment.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.deployment.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 15
