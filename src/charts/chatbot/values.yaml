---
namespace: "agent"

image:
  repository: "sovereign-agent-starter-chatbot"
  tag: "latest"

openaiBaseUrl: "http://ollama.agent.svc.cluster.local:11434/v1"
model: "llama3.2:3b"

service:
  port: 80

deployment:
  containerPort: 8080

enableIntegrationsAdmin: true

# Integration defs rendered into the chatbot-integrations ConfigMap.
# Empty in Tier 0. The /integrations UI generates this block for you.
integrations:
  yaml: |
    integrations: []

# Auth secret values, by secret_ref key. Empty in Tier 0.
integrationSecrets: {}
