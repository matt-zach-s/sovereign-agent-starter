<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BYOC Agent Starter</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#2f81f7; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
    header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
    header h1 { font-size:15px; margin:0; font-weight:600; }
    header span { font-size:12px; color:var(--muted); }
    #log { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
    .msg { max-width:680px; padding:10px 14px; border-radius:10px; line-height:1.45; white-space:pre-wrap; }
    .user { align-self:flex-end; background:var(--accent); color:#fff; }
    .bot  { align-self:flex-start; background:var(--panel); border:1px solid var(--line); }
    .err  { align-self:flex-start; background:#2d1618; border:1px solid #5c2a2a; color:#ffb4b4; font-size:13px; }
    form { display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--line); }
    input { flex:1; background:var(--panel); border:1px solid var(--line); color:var(--text);
            border-radius:8px; padding:11px 14px; font-size:14px; outline:none; }
    input:focus { border-color:var(--accent); }
    button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:0 18px; font-size:14px;
             font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <header>
    <h1>BYOC Agent Starter</h1>
    <span id="meta">self-hosted &middot; no frontier API calls</span>
    <span style="flex:1"></span>
    <a href="/integrations" style="font-size:13px;color:#8b949e;text-decoration:none;">Integrations →</a>
    <button id="clear" type="button" style="background:#161b22;border:1px solid #30363d;color:#8b949e;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;">Clear</button>
  </header>
  <div id="log">
    <div class="msg bot">Hi! I'm running on a self-hosted open-weight model inside this cluster. Ask me anything.</div>
  </div>
  <form id="form">
    <input id="input" placeholder="Type a message…" autocomplete="off" />
    <button id="send" type="submit">Send</button>
  </form>
  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const KEY = 'byoc-chat-history';
    let history = JSON.parse(localStorage.getItem(KEY) || '[]');  // [{role,content}]

    fetch('/health').then(r => r.json()).then(d => {
      document.getElementById('meta').textContent =
        'self-hosted · model: ' + d.model + ' · ' + d.tools + ' tools · no frontier API calls';
    }).catch(() => {});

    function add(text, cls) {
      const el = document.createElement('div');
      el.className = 'msg ' + cls; el.textContent = text;
      log.appendChild(el); log.scrollTop = log.scrollHeight; return el;
    }
    function save() { localStorage.setItem(KEY, JSON.stringify(history)); }
    function render() {
      log.innerHTML = '';
      if (!history.length) add("Hi! I'm running on a self-hosted open-weight model inside this cluster. Ask me anything.", 'bot');
      for (const m of history) add(m.content, m.role === 'user' ? 'user' : 'bot');
    }
    document.getElementById('clear').onclick = () => { history = []; save(); render(); };
    render();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      history.push({role:'user', content:message}); save(); add(message, 'user');
      input.value = ''; send.disabled = true;
      const thinking = add('…', 'bot');
      try {
        const res = await fetch('/api/chat', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({messages: history})
        });
        const data = await res.json();
        if (res.ok) {
          thinking.textContent = data.reply;
          history.push({role:'assistant', content:data.reply}); save();
        } else {
          thinking.remove();
          add(data.error || 'Something went wrong. If this is the first request, the model may still be warming up — try again in a minute.', 'err');
        }
      } catch (err) { thinking.remove(); add('Network error: ' + err, 'err'); }
      finally { send.disabled = false; input.focus(); }
    });
  </script>
</body>
</html>
